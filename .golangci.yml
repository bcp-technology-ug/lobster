# ─────────────────────────────────────────────────────────────────────────────
# golangci-lint configuration
# Docs: https://golangci-lint.run/usage/configuration/
# ─────────────────────────────────────────────────────────────────────────────
version: "2"

run:
  timeout: 5m
  # Include generated files (gen/) in runs.exclude-files so they are skipped.
  build-tags: []

linters:
  # Start from the "standard" recommended set, then extend.
  default: standard

  enable:
    # ── Correctness ───────────────────────────────────────────────────────────
    - bodyclose        # HTTP response bodies must be closed.
    - contextcheck     # Functions should pass context.Context properly.
    - errname          # Error type naming conventions.
    - errorlint        # Correct usage of errors.Is / errors.As / %w.
    - nilerr           # Functions should not return nil errors.
    - noctx            # HTTP requests should use context.
    - rowserrcheck     # sql.Rows.Err() must be checked.
    - sqlclosecheck    # sql.Rows / sql.Stmt must be closed.
    - unparam          # Report unused function parameters.
    - wastedassign     # Detect wasted assignments.

    # ── Security ──────────────────────────────────────────────────────────────
    - gosec            # Common security issues (G-codes).

    # ── Style & maintainability ───────────────────────────────────────────────
    - godot            # Comment sentences should end with a period.
    - prealloc         # Suggest slice pre-allocation.
    - revive           # Opinionated but configurable Go style.
    - thelper          # Test helper functions should call t.Helper().
    - unconvert        # Remove unnecessary type conversions.
    - whitespace       # Unnecessary blank lines.

  disable:
    # Overly strict / causes too many false positives for a project at this stage.
    - depguard
    - exhaustruct      # include:[] checks all types incl. cobra.Command, proto msgs, stdlib.
    - funlen
    - gocognit
    - gocyclo
    - lll
    - maintidx
    - misspell         # Project uses British English intentionally.
    - nlreturn
    - wsl
    - godox            # TODO/FIXME comments are fine.
    - exhaustive       # Not required to handle all enum cases everywhere.

  settings:
    # ── errcheck ──────────────────────────────────────────────────────────────
    errcheck:
      check-type-assertions: true
      check-blank: false

    # ── gosec ────────────────────────────────────────────────────────────────
    gosec:
      excludes:
        - G115  # integer overflow: acceptable for non-crypto counters

    # ── revive ───────────────────────────────────────────────────────────────
    revive:
      rules:
        - name: exported
          disabled: true   # Allow unexported names without doc comments in tests.
        - name: var-naming
          severity: warning
        - name: error-return
          severity: warning
        - name: if-return
          severity: warning
        - name: increment-decrement
          severity: warning
        - name: range
          severity: warning
        - name: unused-parameter
          severity: warning

  exclusions:
    rules:
      # ── errcheck: accepted defer-close patterns ────────────────────────────
      # Deferred Close() calls deliberately discard their error return; this is
      # idiomatic Go for resources managed via defer.
      - linters: [errcheck]
        source: 'defer.*\.Close\(\)'

      # fmt.Print* to cmd stdout/stderr: write errors are non-actionable.
      - linters: [errcheck]
        source: 'fmt\.F?[Pp]rint'

      # ── gosec: intentional file-system operations ─────────────────────────
      # G304 — reading files from paths supplied by the user/config is
      # intentional in a CLI tool; paths are not derived from HTTP input.
      - linters: [gosec]
        text: 'G304'

      # G301/G306 — project scaffolding and config-file creation use 0o755 /
      # 0o644 intentionally; tighter permissions would break usability.
      - linters: [gosec]
        text: 'G301'
      - linters: [gosec]
        text: 'G306'

      # ── godot: step-handler doc comments ──────────────────────────────────
      # Step handler comments end with the Gherkin step pattern text, which is
      # not a prose sentence and therefore does not need a trailing period.
      - linters: [godot]
        source: 'handles:'

      # Short pragmatic "keep X used" import comments are not sentences.
      - linters: [godot]
        source: '// keep '

      # ── contextcheck: intentional context.Background() in cleanup paths ───
      # The async run goroutine in executor.go uses context.Background() for
      # post-run teardown because the original gRPC request context is already
      # cancelled by the time cleanup runs.
      - linters: [contextcheck]
        path: 'internal/runner/executor\.go'

      # Test files: relax several rules that are too strict for test code.
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - exhaustruct
          - unparam

      # Generated code: skip all linting.
      - path: ^gen/
        linters:
          - revive
          - godot
          - gosec
          - unused

      # Generated sqlc code.
      - path: ^gen/sqlc/
        text: ".*"
        linters:
          - revive
          - godot
          - stylecheck
          - unused

      # Protobuf generated code.
      - path: ^gen/go/
        text: ".*"
        linters:
          - revive
          - godot
          - stylecheck
          - unused

      # Migration SQL embeds: the embed.go files are trivial.
      - path: embed\.go
        linters:
          - godot

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gci              # Deterministic import ordering.
    - gofmt            # Enforce standard formatting.
    - goimports        # Enforce standard import grouping.

  settings:
    # ── gci ──────────────────────────────────────────────────────────────────
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/bcp-technology-ug/lobster)

    # ── goimports ────────────────────────────────────────────────────────────
    goimports:
      local-prefixes:
        - github.com/bcp-technology-ug/lobster
