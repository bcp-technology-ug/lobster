version: 2

updates:
  # ── Go module dependencies ────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    # Group all non-major Go updates into a single PR to reduce noise.
    groups:
      go-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    # Always review major updates individually.
    ignore: []
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - go
    reviewers:
      - bencoepp

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
    reviewers:
      - bencoepp

  # ── Docker base images ────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /config
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(docker)"
    labels:
      - dependencies
      - docker
    reviewers:
      - bencoepp
