name: Bug Report
description: Something isn't working as expected.
title: "bug: "
labels: ["bug", "triage"]
assignees: ["bencoepp"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix it quickly.

  - type: input
    id: version
    attributes:
      label: lobster version
      description: Run `lobster --version` or check the release tag.
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Docker / container
    validations:
      required: true

  - type: dropdown
    id: executor_mode
    attributes:
      label: Executor mode
      options:
        - local (default)
        - daemon (lobsterd)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands run, config used, feature file contents, etc.
      placeholder: |
        1. lobster run ...
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      description: Paste any error messages, stack traces, or `--vvv` output. Wrap in ``` fences.
      render: shell

  - type: textarea
    id: config
    attributes:
      label: lobster.yaml (if relevant)
      description: Redact secrets before pasting.
      render: yaml

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I reproduced this on the latest release.
          required: true
