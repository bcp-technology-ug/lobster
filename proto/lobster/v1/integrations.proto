syntax = "proto3";

package lobster.v1.integrations;

option go_package = "github.com/bcp-technology-ug/lobster/gen/go/lobster/v1/integrations;integrationsv1";

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "google/rpc/status.proto";

// v1 intentionally keeps adapter contracts generic.
// Vendor-specific deep-state payloads are deferred to lobster.v2.
enum AdapterState {
  ADAPTER_STATE_UNSPECIFIED = 0;
  ADAPTER_STATE_DISABLED = 1;
  ADAPTER_STATE_READY = 2;
  ADAPTER_STATE_DEGRADED = 3;
  ADAPTER_STATE_ERROR = 4;
}

message AdapterCapability {
  string name = 1;
  bool enabled = 2;
}

message IntegrationAdapter {
  string adapter_id = 1;
  string name = 2;
  string type = 3;
  AdapterState state = 4;
  repeated AdapterCapability capabilities = 5;
  google.protobuf.Any config_extension = 6;
  google.protobuf.Any state_extension = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ListIntegrationAdaptersRequest {
  uint32 page_size = 1 [(buf.validate.field).uint32.gte = 1, (buf.validate.field).uint32.lte = 100];
  string page_token = 2;
}

message ListIntegrationAdaptersResponse {
  repeated IntegrationAdapter adapters = 1;
  string next_page_token = 2;
}

message GetIntegrationAdapterRequest {
  string adapter_id = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
}

message GetIntegrationAdapterResponse {
  IntegrationAdapter adapter = 1;
}

message SetIntegrationAdapterStateRequest {
  string adapter_id = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
  bool enabled = 2;
  string reason = 3 [(buf.validate.field).string.max_len = 512];
}

message SetIntegrationAdapterStateResponse {
  IntegrationAdapter adapter = 1;
}

message ValidateIntegrationAdapterRequest {
  string adapter_id = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
}

message ValidateIntegrationAdapterResponse {
  bool ok = 1;
  google.rpc.Status diagnostic = 2;
}

service IntegrationService {
  rpc ListIntegrationAdapters(ListIntegrationAdaptersRequest) returns (ListIntegrationAdaptersResponse) {
    option (google.api.http) = {get: "/api/v1/integrations"};
  }

  rpc GetIntegrationAdapter(GetIntegrationAdapterRequest) returns (GetIntegrationAdapterResponse) {
    option (google.api.http) = {get: "/api/v1/integrations/{adapter_id}"};
  }

  rpc SetIntegrationAdapterState(SetIntegrationAdapterStateRequest) returns (SetIntegrationAdapterStateResponse) {
    option (google.api.http) = {
      post: "/api/v1/integrations/{adapter_id}:setState"
      body: "*"
    };
  }

  rpc ValidateIntegrationAdapter(ValidateIntegrationAdapterRequest) returns (ValidateIntegrationAdapterResponse) {
    option (google.api.http) = {post: "/api/v1/integrations/{adapter_id}:validate"};
  }
}
