syntax = "proto3";

package lobster.v1.run;

option go_package = "github.com/bcp-technology/lobster/gen/go/lobster/v1/run;runv1";

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/rpc/status.proto";
import "lobster/v1/common.proto";
import "lobster/v1/config.proto";

message DocString {
  string content_type = 1;
  string content = 2;
}

message DataTableRow {
  repeated string cells = 1;
}

message DataTable {
  repeated string headers = 1;
  repeated DataTableRow rows = 2;
}

message Step {
  string keyword = 1;
  string text = 2;
  DataTable data_table = 3;
  DocString doc_string = 4;
}

message ScenarioExample {
  int32 row_index = 1;
  map<string, string> values = 2;
}

message Scenario {
  string scenario_id = 1;
  string name = 2;
  string description = 3;
  repeated string tags = 4;
  repeated Step steps = 5;
  ScenarioExample example = 6;
  lobster.v1.common.DeterministicScenarioKey deterministic_key = 7;
}

message Feature {
  string name = 1;
  string description = 2;
  repeated string tags = 3;
  repeated Step background_steps = 4;
  repeated Scenario scenarios = 5;
}

enum VariableScope {
  VARIABLE_SCOPE_UNSPECIFIED = 0;
  VARIABLE_SCOPE_SCENARIO = 1;
  VARIABLE_SCOPE_SUITE = 2;
}

message Variable {
  string name = 1;
  google.protobuf.Value value = 2;
  VariableScope scope = 3;
}

message AssertionFailure {
  string path = 1;
  string operator = 2;
  google.protobuf.Value expected = 3;
  google.protobuf.Value actual = 4;
  string message = 5;
}

message StepResult {
  string step_id = 1;
  lobster.v1.common.StepStatus status = 2;
  google.protobuf.Duration duration = 3;
  repeated AssertionFailure assertion_failures = 4;
  google.rpc.Status error = 5;
}

message HookResult {
  string hook_id = 1;
  lobster.v1.common.HookType hook_type = 2;
  lobster.v1.common.StepStatus status = 3;
  google.protobuf.Duration duration = 4;
  google.rpc.Status error = 5;
}

message ScenarioResult {
  string scenario_id = 1;
  lobster.v1.common.ScenarioStatus status = 2;
  google.protobuf.Duration duration = 3;
  repeated StepResult step_results = 4;
  repeated HookResult hook_results = 5;
}

message RunSummary {
  uint32 total_scenarios = 1;
  uint32 passed_scenarios = 2;
  uint32 failed_scenarios = 3;
  uint32 skipped_scenarios = 4;
  google.protobuf.Duration duration = 5;
}

message Run {
  string run_id = 1;
  string workspace_id = 2;
  string profile_name = 3;
  lobster.v1.common.RunStatus status = 4;
  Feature feature = 5;
  repeated ScenarioResult scenario_results = 6;
  repeated HookResult suite_hook_results = 7;
  repeated Variable variables = 8;
  RunSummary summary = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp started_at = 11;
  google.protobuf.Timestamp ended_at = 12;
}

enum RunEventType {
  RUN_EVENT_TYPE_UNSPECIFIED = 0;
  RUN_EVENT_TYPE_RUN_STATUS = 1;
  RUN_EVENT_TYPE_SCENARIO_RESULT = 2;
  RUN_EVENT_TYPE_STEP_RESULT = 3;
  RUN_EVENT_TYPE_HOOK_RESULT = 4;
  RUN_EVENT_TYPE_DIAGNOSTIC = 5;
  RUN_EVENT_TYPE_SUMMARY = 6;
}

message RunEvent {
  uint64 sequence = 1;
  string run_id = 2;
  google.protobuf.Timestamp observed_at = 3;
  oneof payload {
    lobster.v1.common.RunStatus run_status = 4;
    ScenarioResult scenario_result = 5;
    StepResult step_result = 6;
    HookResult hook_result = 7;
    google.rpc.Status diagnostic = 8;
    RunSummary summary = 9;
  }
  RunEventType event_type = 10;
  map<string, string> metadata = 11;
  bool terminal = 12;
}

message RunSelector {
  string workspace_id = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
  string feature_path = 2 [(buf.validate.field).string.max_len = 1024];
  string tag_expression = 3 [(buf.validate.field).string.max_len = 512];
  string profile_name = 4 [(buf.validate.field).string.max_len = 64];
}

message RunSyncRequest {
  RunSelector selector = 1 [(buf.validate.field).required = true];
  lobster.v1.config.ExecutionConfig execution = 2;
  map<string, string> variables = 3 [(buf.validate.field).map.max_pairs = 200];
}

message RunAsyncRequest {
  RunSelector selector = 1 [(buf.validate.field).required = true];
  lobster.v1.config.ExecutionConfig execution = 2;
  map<string, string> variables = 3 [(buf.validate.field).map.max_pairs = 200];
  string idempotency_key = 4 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
}

message RunAsyncResponse {
  string run_id = 1;
  google.protobuf.Timestamp accepted_at = 2;
  bool idempotent_replay = 3;
  string replay_of_run_id = 4;
}

message GetRunRequest {
  string run_id = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
}

message GetRunResponse {
  Run run = 1;
}

message StreamRunEventsRequest {
  string run_id = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
  uint64 from_sequence = 2;
}

message CancelRunRequest {
  string run_id = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
  string reason = 2 [(buf.validate.field).string.max_len = 512];
}

message CancelRunResponse {
  string run_id = 1;
  lobster.v1.common.RunStatus terminal_status = 2;
}

message ListRunsRequest {
  uint32 page_size = 1 [(buf.validate.field).uint32.gte = 1, (buf.validate.field).uint32.lte = 100];
  string page_token = 2;
  string workspace_id = 3 [(buf.validate.field).string.max_len = 128];
  lobster.v1.common.RunStatus status = 4;
}

message ListRunsResponse {
  repeated Run runs = 1;
  string next_page_token = 2;
}

service RunService {
  rpc RunSync(RunSyncRequest) returns (stream RunEvent) {
    option (google.api.http) = {
      post: "/api/v1/runs:sync"
      body: "*"
    };
  }

  rpc RunAsync(RunAsyncRequest) returns (RunAsyncResponse) {
    option (google.api.http) = {
      post: "/api/v1/runs:async"
      body: "*"
    };
  }

  rpc GetRun(GetRunRequest) returns (GetRunResponse) {
    option (google.api.http) = {get: "/api/v1/runs/{run_id}"};
  }

  rpc StreamRunEvents(StreamRunEventsRequest) returns (stream RunEvent) {
    option (google.api.http) = {get: "/api/v1/runs/{run_id}:events"};
  }

  rpc CancelRun(CancelRunRequest) returns (CancelRunResponse) {
    option (google.api.http) = {
      post: "/api/v1/runs/{run_id}:cancel"
      body: "*"
    };
  }

  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse) {
    option (google.api.http) = {get: "/api/v1/runs"};
  }
}
